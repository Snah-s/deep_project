experiment_name: esc_counter
layout: counter_circuit
init_from: null
nav_shaping_coef: 0.5
partner_spec:
  type: mixture
  specs:
  - type: greedy
    sticky_p:
    - 0.0
    - 0.4
    eps:
    - 0.0
    - 0.3
  - type: greedy
  - type: stay
  probs:
  - 0.5
  - 0.25
  - 0.25
randomize_index: true
old_dynamics: true
horizon: 250
total_timesteps: 10000000
n_envs: 40
vec: subproc
checkpoint_freq: 500000
device: cpu
seed: 0
ppo:
  policy: MlpPolicy
  net_arch:
  - 256
  - 256
  activation: tanh
  learning_rate: 0.0003
  lr_schedule: linear
  ent_coef: 0.05
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 1024
  batch_size: 2048
  n_epochs: 8
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
shaping:
  anneal_fraction: 0.7
eval:
  freq: 250000
  seeds:
  - 67
  - 68
  - 69
  partner_spec:
    type: greedy
    sticky_p: 0.25
    eps: 0.15
output_dir: outputs/esc_counter
