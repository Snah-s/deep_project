experiment_name: esc_robust
layout:
- cramped_room
- coordination_ring
- counter_circuit_o_1order
init_from: null
partner_spec:
  type: mixture
  specs:
  - type: self
    eps:
    - 0.2
    - 0.5
  - type: greedy
  - type: greedy
    sticky_p:
    - 0.0
    - 0.4
  - type: greedy
    eps:
    - 0.0
    - 0.4
  - type: random_motion
  - type: stay
  probs:
  - 0.4
  - 0.2
  - 0.15
  - 0.1
  - 0.1
  - 0.05
selfplay_refresh_freq: 100000
randomize_index: true
old_dynamics: true
horizon: 250
total_timesteps: 8000000
n_envs: 8
vec: subproc
checkpoint_freq: 500000
device: cuda
seed: 0
ppo:
  policy: MlpPolicy
  net_arch:
  - 256
  - 256
  activation: tanh
  learning_rate: 0.0003
  lr_schedule: linear
  ent_coef: 0.03
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 1024
  batch_size: 2048
  n_epochs: 8
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
shaping:
  anneal_fraction: 0.6
eval:
  freq: 250000
  seeds:
  - 67
  - 68
  - 69
  partner_spec:
    type: greedy
output_dir: outputs/esc_robust
