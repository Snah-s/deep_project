seed: 67
mode: debug
environment: {layout_name: cramped_room, layout_file: null, horizon: 250, old_dynamics: true}
policies:
  agent_0:
    type: python_class
    path: tools/sb3_student_agent.py
    class_name: StudentAgent
    name: esc1_azul
    config: {checkpoint: esc1/esc1_greedy_cramped_room/best_model}
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    ingredient: onion
    avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution: {num_episodes: 1, episode_seeds: [67], swap_agent_positions: false}
observation: {type: featurized, include_agent_index: true}
rendering: {mode: gif, fps: 6, save_gif: true, gif_path: outputs/coop_esc1_greedy.gif}
logging: {output_dir: outputs/coop_run, save_step_log: false, save_episode_summary: true, save_trajectory_pickle: false}
