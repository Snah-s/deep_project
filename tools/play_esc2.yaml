# Demo Esc.2: entregable (deliverable/) vs greedy_full_task en coordination_ring.
# Correr con scripts/demo.sh 2.  agent_0 (azul) = NUESTRO modelo.
seed: 67
mode: debug
environment:
  layout_name: coordination_ring
  layout_file: null
  horizon: 250
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: deliverable/student_agent.py
    class_name: StudentAgent
    name: entregable
    config: {}
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 1
  episode_seeds: [67]
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 7
  window_caption: "Esc.2 coordination_ring - azul=entregable vs greedy"
  save_gif: false
  gif_path: outputs/demo_esc2.gif
logging:
  output_dir: outputs/demo_esc2_run
  save_step_log: false
  save_episode_summary: true
  save_trajectory_pickle: false
