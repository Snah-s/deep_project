# Test Esc.4: entregable (deliverable/) vs greedy_full_task en el layout nuevo scenario_4.
# Correr: micromamba run -n overcooked python tools/play.py --config tools/play_esc4.yaml --gif
# agent_0 (azul) = NUESTRO modelo (default.pt, features crudas).
seed: 67
mode: debug
environment:
  layout_name: null
  layout_file: overcooked/configs/layouts/scenario_4.layout
  horizon: 250
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: deliverable/student_agent.py
    class_name: StudentAgent
    name: entregable
    config: {}
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 5
  episode_seeds: [67, 68, 69, 70, 71]
  swap_agent_positions: false
observation:
  type: featurized
  include_agent_index: true
rendering:
  mode: window
  fps: 7
  window_caption: "Esc.4 scenario_4 - azul=entregable vs greedy"
  save_gif: false
  gif_path: outputs/demo_esc4.gif
logging:
  output_dir: outputs/demo_esc4_run
  save_step_log: false
  save_episode_summary: true
  save_trajectory_pickle: false
