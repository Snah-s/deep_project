experiment_name: esc_coord
layout: coordination_ring
init_from: esc_scenarios_nav_multi/best_model
nav_shaping_coef: 0.5
partner_spec:
  type: mixture
  specs:
  - type: greedy
    sticky_p:
    - 0.3
    - 0.6
  - type: greedy
    sticky_p:
    - 0.0
    - 0.3
  - type: greedy
  - type: greedy
    sticky_p:
    - 0.2
    - 0.5
    eps:
    - 0.0
    - 0.2
  probs:
  - 0.45
  - 0.3
  - 0.15
  - 0.1
randomize_index: true
old_dynamics: true
horizon: 250
total_timesteps: 6000000
n_envs: 40
vec: subproc
checkpoint_freq: 500000
device: cpu
seed: 0
ppo:
  policy: MlpPolicy
  net_arch:
  - 256
  - 256
  activation: tanh
  learning_rate: 0.0003
  lr_schedule: linear
  ent_coef: 0.03
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 1024
  batch_size: 2048
  n_epochs: 8
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
shaping:
  anneal_fraction: 0.6
eval:
  freq: 250000
  seeds:
  - 67
  - 68
  - 69
  partner_spec:
    type: greedy
    sticky_p: 0.35
output_dir: outputs/esc_coord
