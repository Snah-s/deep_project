experiment_name: esc4_solo
layout: cramped_room
init_from: null
partner_spec:
  type: mixture
  specs:
  - type: random_motion
  - type: stay
  probs:
  - 0.7
  - 0.3
randomize_index: true
old_dynamics: true
horizon: 250
total_timesteps: 5000000
n_envs: 8
vec: subproc
checkpoint_freq: 500000
device: auto
seed: 0
ppo:
  policy: MlpPolicy
  net_arch:
  - 256
  - 256
  activation: tanh
  learning_rate: 0.0003
  lr_schedule: linear
  ent_coef: 0.05
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 1024
  batch_size: 2048
  n_epochs: 8
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
shaping:
  anneal_fraction: 0.6
eval:
  freq: 250000
  seeds:
  - 67
  - 68
  - 69
  partner_spec:
    type: random_motion
output_dir: outputs/esc4
