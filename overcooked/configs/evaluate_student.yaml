# Evaluacion del entregable principal (StudentAgent basado en el greedy arreglado).
# CLAVE: observation.type debe ser "state" (el agente corre el greedy sobre el estado crudo).
# Confirmar con la catedra que la evaluacion oficial usa este tipo de observacion.
seed: 67
mode: evaluation
environment:
  layout_name: cramped_room
  layout_file: null
  horizon: 400
  old_dynamics: true
policies:
  agent_0:
    type: python_class
    path: policies/student_agent.py
    class_name: StudentAgent
    name: student
    config:
      ingredient: onion
      avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
  agent_1:
    type: builtin
    name: greedy_full_task
    ingredient: onion
    avoid_teammate: true
    random_action_prob: 0.0
    max_action_time_ms: 100
    invalid_action: stay
    timeout_action: stay
execution:
  num_episodes: 3
  episode_seeds:
  - 67
  - 68
  - 69
  swap_agent_positions: true
observation:
  type: state
  include_agent_index: true
rendering:
  mode: none
  fps: 0
  save_gif: false
logging:
  output_dir: outputs/evaluate_student
  save_step_log: true
  save_episode_summary: true
  save_trajectory_pickle: false
