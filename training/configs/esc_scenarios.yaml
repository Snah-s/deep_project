# esc_scenarios.yaml — Generalista para los 3 ESCENARIOS revelados de la competencia.
#
#   Esc.1  asymmetric_advantages  + greedy_full_task
#   Esc.2  coordination_ring      + greedy_full_task (sticky)
#   Esc.3  counter_circuit        + greedy_full_task (sticky + random)
#
# En LOS TRES el compañero es greedy_full_task COMPETENTE (perturbado) -> nuestro agente
# coordina con un cocinero que SÍ funciona; no carga el layout solo. Por eso NO usamos
# self-play ni compañeros inútiles: entrenamos vs una mezcla de greedy a distintos niveles
# de perturbación que cubre los 3 escenarios. El greedy competente da señal esparsa real
# en counter_circuit (antes con inútiles era imposible -> el agente colapsaba a interact-spam).
#
# Selección de best_model: eval POR-LAYOUT emparejando cada escenario (partner_by_layout).
# El score oficial solo cuenta entregas reales -> una política que "farmea" shaping puntúa 0
# en eval y nunca se guarda como best.

experiment_name: esc_scenarios
layout:
  - asymmetric_advantages
  - coordination_ring
  - counter_circuit
init_from: null               # desde cero (no importar el interact-spam de esc_robust)

# Mezcla de entrenamiento: greedy competente a varios niveles de perturbación (cubre Esc.1-3).
partner_spec:
  type: mixture
  specs:
    - {type: greedy}                                       # Esc.1: greedy limpio
    - {type: greedy, sticky_p: [0.0, 0.4]}                 # Esc.2: greedy + sticky
    - {type: greedy, sticky_p: [0.0, 0.4], eps: [0.0, 0.3]}# Esc.3: greedy + sticky + random
  probs: [0.34, 0.33, 0.33]

randomize_index: true
old_dynamics: true
horizon: 250

total_timesteps: 8000000
n_envs: 8                      # override en el cluster: --n-envs 40
vec: subproc
checkpoint_freq: 500000
device: auto
seed: 0

ppo:
  policy: MlpPolicy
  net_arch: [256, 256]
  activation: tanh
  learning_rate: 3.0e-4
  lr_schedule: linear
  ent_coef: 0.05              # exploración alta: hay que recorrer los anillos, no plantarse
  gamma: 0.99
  gae_lambda: 0.95
  n_steps: 1024
  batch_size: 2048
  n_epochs: 8
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5

shaping:
  anneal_fraction: 0.6         # el shaping arranca los pickups; luego pesa la entrega real

eval:
  freq: 250000
  seeds: [67, 68, 69]
  partner_spec: {type: greedy}          # fallback si un layout no está en partner_by_layout
  # Empareja cada escenario (magnitudes de sticky/random asumidas; ajustables).
  partner_by_layout:
    asymmetric_advantages: {type: greedy}
    coordination_ring:     {type: greedy, sticky_p: 0.25}
    counter_circuit:       {type: greedy, sticky_p: 0.25, eps: 0.15}

output_dir: outputs/esc_scenarios
