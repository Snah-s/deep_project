# environment.yml — Entorno reproducible con micromamba para el proyecto Overcooked-AI
#
# Crear:      micromamba create -f environment.yml -y
# Activar:    micromamba activate overcooked
# Verificar:  python tests/test_env_smoke.py   (GATE 0 del PLAN.md)
#
# Notas de reproducibilidad:
# - Python 3.10 fijado: coincide con la plantilla del profesor (bytecode cpython-310)
#   y es compatible con todo el stack. NO subir a 3.13+ sin re-validar el GATE 0.
# - numpy<2 es OBLIGATORIO: overcooked-ai (PyPI) usa np.Inf, eliminado en NumPy 2.0.
# - torch se instala por pip para controlar la variante CPU/CUDA de forma explícita.
#   Por defecto va la de PyPI (trae CUDA en Linux). Para forzar solo-CPU, reemplazar
#   la línea de torch por:  --extra-index-url https://download.pytorch.org/whl/cpu
# - Los pines usan compatible-release (~=) para que sea reproducible sin congelar
#   parches de seguridad. Para un lockfile exacto: pip freeze > requirements.lock
#   después del primer GATE 0 en verde, y commitearlo.

name: overcooked
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - numpy=1.26.*          # <2 obligatorio (np.Inf removido en NumPy 2.0)
  - pyyaml
  - tqdm
  - matplotlib            # curvas de EXPERIMENTS.md y renders del harness
  - pytest                # gates de las etapas
  - pygame                # rendering de la plantilla del profesor (play/collect_demos)
  - pip:
      - overcooked-ai            # entorno oficial (PyPI); la plantilla lo importa
      - stable-baselines3~=2.9   # PPO del camino principal
      - gymnasium~=1.3
      - torch~=2.13              # inferencia CPU del entregable + entrenamiento
      - opencv-python-headless<4.13  # dependencia de overcooked-ai compatible con numpy<2
      - tensorboard              # curvas de entrenamiento (opcional; train_ppo lo detecta)
